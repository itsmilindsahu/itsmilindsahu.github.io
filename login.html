<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Research Portal — Login</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="axl-favicon.svg" type="image/svg+xml">
  <style>
    .login-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 32px 16px;
      background: var(--off-white);
    }

    .login-form {
      width: 100%;
      max-width: 400px;
    }

    .login-header {
      text-align: center;
      margin-bottom: 48px;
    }

    .login-header h1 {
      font-family: var(--font-display);
      font-size: 32px;
      letter-spacing: 2px;
      color: var(--black);
      margin-bottom: 12px;
      line-height: 1;
    }

    .login-header p {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--mid-grey);
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-group label {
      display: block;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--black);
      margin-bottom: 8px;
      font-weight: 700;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--light-grey);
      background: var(--white);
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--black);
      transition: all 0.2s;
      box-sizing: border-box;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(26, 86, 219, 0.1);
    }

    .login-button {
      width: 100%;
      padding: 12px 16px;
      background: var(--accent);
      border: 1px solid var(--accent);
      color: var(--white);
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .login-button:hover {
      background: var(--accent-2);
      border-color: var(--accent-2);
    }

    .error-message {
      display: none;
      padding: 12px 16px;
      background: #fee;
      border: 1px solid #fcc;
      border-radius: 2px;
      font-size: 12px;
      color: #d32f2f;
      margin-bottom: 24px;
      letter-spacing: 0.5px;
    }

    .error-message.show {
      display: block;
      animation: slideDown 0.2s ease-out;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 768px) {
      .login-header h1 {
        font-size: 28px;
      }

      .login-form {
        max-width: 100%;
        padding: 0 16px;
      }
    }
  </style>
</head>
<body>
<div class="cursor"></div><div class="cursor-ring"></div>
  <div class="login-container">
    <form class="login-form" onsubmit="handleLogin(event)">
      <div class="login-header">
        <h1>Research Portal<span style="color:var(--accent)">_</span></h1>
        <p>Secure Internship Journal</p>
      </div>

      <div class="error-message" id="error-message"></div>

      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          placeholder="Enter password"
          required
          autofocus
        >
      </div>

      <button type="submit" class="login-button">Access Portal</button>
    </form>
  </div>

  <script src="script.js"></script>
  <script>
    // ⚠️ SECURITY NOTE: For production, store password in environment variables
    // or use a backend authentication service. Do NOT commit real passwords to git!
    const CORRECT_PASSWORD = 'research2026';

    function handleLogin(event) {
      event.preventDefault();

      const passwordInput = document.getElementById('password');
      const errorMessage = document.getElementById('error-message');
      const password = passwordInput.value.trim();

      if (password === CORRECT_PASSWORD) {
        // Set login flag
        localStorage.setItem('research-portal-logged-in', 'true');
        localStorage.setItem('research-portal-login-time', new Date().toISOString());

        // Redirect to return URL or default page
        const returnUrl = sessionStorage.getItem('research-return-url') || 'research-internship.html';
        sessionStorage.removeItem('research-return-url');
        window.location.href = returnUrl;
      } else {
        errorMessage.textContent = 'Invalid password. Please try again.';
        errorMessage.classList.add('show');
        passwordInput.value = '';
        passwordInput.focus();
      }
    }

    // Auto-focus on password field
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('password').focus();
    });
  </script>
</body>
</html>
