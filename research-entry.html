    .research-article-date {

      font-style: italic;

      border: 1px solid var(--light-grey);

    .research-article-content h2 {

      font-weight: 700;
      color: var(--black);
      margin-top: 32px;
      margin-bottom: 16px;
      letter-spacing: 0.5px;
    }

    .research-article-content h3 {
      font-size: 15px;
      font-weight: 700;
      color: var(--black);
      margin-top: 24px;
      margin-bottom: 12px;
    }

    .research-article-content p {
      margin-bottom: 16px;
      line-height: 1.8;
    }

    .research-article-content ul,
    .research-article-content ol {
      margin-bottom: 16px;
      margin-left: 24px;
    }

    .research-article-content li {
      margin-bottom: 8px;
    }

    .research-article-content a {
      color: var(--accent);
      text-decoration: underline;
      font-weight: 600;
    }

    .research-article-content a:hover {
      color: var(--accent-2);
    }

    .research-article-content code {
      background: var(--off-white);
      padding: 2px 6px;
      border-radius: 2px;
      font-family: var(--font-mono);
      font-size: 12px;
      color: #c75c5c;
    }

    .research-article-content pre {
      background: var(--black);
      color: #00c896;
      padding: 16px;
      border-radius: 4px;
      overflow-x: auto;
      margin-bottom: 16px;
      font-size: 12px;
      line-height: 1.6;
    }

    .research-article-content pre code {
      background: none;
      padding: 0;
      color: inherit;
    }

    .research-article-content blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 16px;
      margin-left: 0;
      margin-bottom: 16px;
      color: var(--mid-grey);
      font-style: italic;
    }

    .research-article-content table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 16px;
    }

    .research-article-content table th,
    .research-article-content table td {
      border: 1px solid var(--light-grey);
      padding: 10px 12px;
      text-align: left;
    }

    .research-article-content table th {

    }

    .research-article-footer {
      margin-top: 48px;
      padding-top: 32px;
      border-top: 1px solid var(--light-grey);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .research-article-nav {
      display: flex;
      gap: 16px;
    }

    .research-article-nav-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 700;
      transition: gap 0.2s;
    }

    .research-article-nav-link:hover {

    }

    .research-error {

      text-align: center;
      color: var(--mid-grey);
    }

    @media (max-width: 768px) {

      }

      .research-article-footer {
        flex-direction: column;
        gap: 24px;
        align-items: flex-start;
      }
    }
  </style>

<script src="script.js"></script>
<script>
  // Simple frontmatter parser
  function parseFrontmatter(text) {
    if (!text.startsWith('---')) {
      return { data: {}, content: text };
    }
    
    const lines = text.split('\n');
    let endIdx = -1;
    for (let i = 1; i < lines.length; i++) {
      if (lines[i].trim() === '---') {
        endIdx = i;
        break;
      }
    }
    
    if (endIdx === -1) {
      return { data: {}, content: text };
    }
    
    const frontmatterText = lines.slice(1, endIdx).join('\n');
    const content = lines.slice(endIdx + 1).join('\n');
    
    const data = {};
    const lines_fm = frontmatterText.split('\n');
    for (const line of lines_fm) {
      const match = line.match(/^([^:]+):\s*(.+)$/);
      if (match) {
        let value = match[2].trim();
        // Handle quoted strings
        if ((value.startsWith('"') && value.endsWith('"')) || 
            (value.startsWith("'") && value.endsWith("'"))) {
          value = value.slice(1, -1);
        }
        // Handle arrays
        if (value.startsWith('[') && value.endsWith(']')) {
          value = value.slice(1, -1)
            .split(',')
            .map(v => v.trim().replace(/^["']|["']$/g, ''));
        }
        data[match[1].trim()] = value;
      }
    }
    
    return { data, content };
  }

  // Parse URL parameters
  const urlParams = new URLSearchParams(window.location.search);
  const slug = urlParams.get('slug');

  async function loadResearchEntry() {
    const container = document.getElementById('research-article');
    const titleEl = document.getElementById('entry-title');

    if (!slug) {
      container.innerHTML = `
        <div class="research-error">
          <div>No entry specified. <a href="research-internship.html" style="color: var(--accent);">Return to entries →</a></div>
        </div>
      `;
      return;
    }

    try {
      const response = await fetch(`./content/research-internship/${slug}.md`);
      if (!response.ok) throw new Error('Entry not found');

      const mdText = await response.text();
      const { data, content } = parseFrontmatter(mdText);

      // Set page title
      document.title = `${data.title || 'Untitled'} — Research Internship`;
      titleEl.textContent = data.title || 'Untitled';

      // Parse and render markdown
      const htmlContent = marked.parse(content);

      // Build the article
      const date = new Date(data.date || new Date()).toLocaleDateString('en-US', { 
        year: 'numeric', 
        month: 'long', 
        day: 'numeric' 
      });

      container.innerHTML = `
        <div class="research-article-meta">
          <div class="research-article-date">${date}</div>
          <h1 class="research-article-title">${escapeHtml(data.title || 'Untitled')}</h1>
          ${data.summary ? `<p class="research-article-summary">${escapeHtml(data.summary)}</p>` : ''}
          ${Array.isArray(data.tags) && data.tags.length > 0 ? `
            <div class="research-article-tags">
              ${data.tags.map(tag => `<span class="research-article-tag">${escapeHtml(tag)}</span>`).join('')}
            </div>
          ` : ''}
        </div>
        <div class="research-article-content">${htmlContent}</div>
        <div class="research-article-footer">
          <div class="research-article-nav">
            <a href="research-internship.html" class="research-article-nav-link">← All Entries</a>
          </div>
        </div>
      `;

      // Trigger fade-in
      container.classList.add('visible');
    } catch (err) {
      console.error('Error loading research entry:', err);
      container.innerHTML = `
        <div class="research-error">
          <div>Error loading research entry. <a href="research-internship.html" style="color: var(--accent);">Return to entries →</a></div>
        </div>
      `;
    }
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  document.addEventListener('DOMContentLoaded', loadResearchEntry);
</script>
</body>
</html>
